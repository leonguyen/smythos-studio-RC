app = "your-smythos-app"  # Set via fly launch
primary_region = "iad"    # Choose closest to HCMC, e.g., "sin" if available

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  NODE_ENV = "production"
  # Add from .env: DB_HOST, API_KEYS, etc.
  # e.g., DATABASE_URL = "mysql://..."

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[mounts]
  source = "smythos_data"  # fly volumes create smythos_data
  destination = "/data"