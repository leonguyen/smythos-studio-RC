app = "your-smythos-app"
primary_region = "sin"  # Closest to HCMC (Singapore)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

# Optional: Add checks
[[http_service.checks]]
  interval = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"  # Adjust to your app's health endpoint
  protocol = "http"
  timeout = "2s"